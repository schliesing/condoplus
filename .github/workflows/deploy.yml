name: Deploy - VPS Deployment

on:
  push:
    branches: [main]

jobs:
  # ============================================================================
  # DISPARAR DEPLOY NO VPS VIA WEBHOOK
  # ============================================================================
  deploy:
    name: Disparar Deploy no VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Notificar VPS para fazer deploy
        run: |
          echo "Disparando webhook de deploy..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://187.77.51.167:9000/webhook/deploy \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -d '{"ref":"refs/heads/main","repository":"condoplus"}' \
            --max-time 10)
          echo "Status HTTP: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "Deploy disparado com sucesso!"
          else
            echo "Falha ao disparar webhook (status $RESPONSE). Deploy manual necessario."
          fi
        continue-on-error: true

      - name: Aguardar deploy completar
        run: sleep 15

      - name: Health check
        run: |
          for i in {1..5}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://187.77.51.167:3001/health --max-time 5)
            if [ "$RESPONSE" = "200" ]; then
              echo "API esta respondendo - deploy OK!"
              exit 0
            fi
            echo "Tentativa $i/5... aguardando API"
            sleep 5
          done
          echo "Health check nao confirmado, mas deploy foi disparado."
