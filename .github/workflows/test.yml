name: Tests - Unit, Integration & E2E

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18.x'

jobs:
  # ============================================================================
  # BACKEND TESTS
  # ============================================================================
  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: condoplus_test
          POSTGRES_USER: condoplus
          POSTGRES_PASSWORD: condoplus123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias (backend)
        working-directory: ./backend
        run: npm install

      - name: Executar testes backend
        working-directory: ./backend
        run: npm run test:ci
        env:
          NODE_ENV: test
          PORT: 3001
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: condoplus_test
          DB_USER: condoplus
          DB_PASSWORD: condoplus123
          JWT_SECRET: test_secret_key_for_ci

  # ============================================================================
  # FRONTEND TESTS
  # ============================================================================
  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias (frontend)
        working-directory: ./frontend
        run: npm install

      - name: Executar testes frontend
        working-directory: ./frontend
        run: npm run test -- --run

  # ============================================================================
  # BUILD VERIFICATION
  # ============================================================================
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar dependencias (frontend)
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: http://187.77.51.167:3001/api

      - name: Verificar build gerado
        run: ls -la frontend/dist/

  # ============================================================================
  # RESULTADO
  # ============================================================================
  test-report:
    name: Resultado Final
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, build-verification]
    if: always()

    steps:
      - name: Testes OK
        if: ${{ needs.backend-tests.result == 'success' && needs.frontend-tests.result == 'success' }}
        run: echo "Todos os testes passaram. Deploy sera disparado."

      - name: Testes Falharam
        if: ${{ needs.backend-tests.result == 'failure' || needs.frontend-tests.result == 'failure' }}
        run: |
          echo "Testes falharam. Verifique os logs."
          exit 1
